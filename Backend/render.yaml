services:
  - type: web
    name: schub-api
    runtime: python
    repo: https://github.com/your-org/student-centre
    plan: free
    region: frankfurt
    branch: main
    buildCommand: |
      cd Backend
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: cd Backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: schub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: schub-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: schub-redis
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "localhost,.onrender.com"
      - key: FRONTEND_URL
        sync: false
      - key: USE_S3
        value: "False"

  - type: worker
    name: schub-worker
    runtime: python
    repo: https://github.com/your-org/student-centre
    plan: free
    region: frankfurt
    branch: main
    buildCommand: cd Backend && pip install -r requirements.txt
    startCommand: cd Backend && celery -A config worker --loglevel=info --concurrency=4

databases:
  - name: schub-db
    region: frankfurt
    plan: free
    databaseType: postgresql
    ipAllowList: []

redis:
  - name: schub-redis
    region: frankfurt
    plan: free
    maxmemoryPolicy: noeviction
